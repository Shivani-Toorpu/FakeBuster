services:
  - type: web
    name: FakeBuster
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run news_validator.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TAVILY_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
